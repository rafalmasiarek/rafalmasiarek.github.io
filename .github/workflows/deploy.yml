name: Build and Deploy Jekyll via rsync

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Resolve Kirby submodule metadata
        id: kirby_meta
        shell: bash
        run: |
          set -euo pipefail

          KIRBY_URL="$(git config --file .gitmodules --get submodule.kirby/core.url)"
          KIRBY_SHA="$(git ls-tree HEAD kirby/core | awk '{print $3}')"

          printf 'url=%s\n' "$KIRBY_URL" >> "$GITHUB_OUTPUT"
          printf 'sha=%s\n' "$KIRBY_SHA" >> "$GITHUB_OUTPUT"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ secrets.RUBY_VERSION }}
          bundler-cache: false

      - name: Cache Ruby gems
        uses: actions/cache@v5
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-

      - name: Install dependencies
        run: |
          set -euo pipefail
          gem install bundler
          bundle config set path 'vendor/bundle'
          bundle install --jobs 4 --retry 3

      - name: Set up Node.js (for minifiers)
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install minifiers
        run: |
          set -euo pipefail
          npm i -g terser clean-css-cli

      - name: Minify JS (assets/js/*.js -> *.min.js)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          for f in assets/js/*.js; do
            case "$f" in
              *.min.js)
                echo "Skipping already minified: $f"
                ;;
              *)
                out="${f%.js}.min.js"
                echo "Minifying $f -> $out"
                terser "$f" -c -m --comments false -o "$out"
                ;;
            esac
          done

      - name: Minify CSS (assets/css/*.css -> *.min.css)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          for f in assets/css/*.css; do
            case "$f" in
              *.min.css)
                echo "Skipping already minified: $f"
                ;;
              *)
                out="${f%.css}.min.css"
                echo "Minifying $f -> $out"
                cleancss -O2 -o "$out" "$f"
                ;;
            esac
          done

      - name: Generate deploy config
        shell: bash
        run: |
          set -euo pipefail
          VER="${GITHUB_SHA}"
          TS="$(date +%s%6N)"
          printf 'asset_build:\n  version: "%s"\n  timestamp: "%s"\napp_env: "production"\n' "$VER" "$TS" > _config.deploy.yml

      - name: Build Jekyll site
        run: bundle exec jekyll build --config _config.yml,_config.deploy.yml
        env:
          JEKYLL_ENV: production

      - name: Precompress assets in _site (gzip + brotli)
        shell: bash
        run: |
          set -euo pipefail
          find _site -type f \
            ! -path "_site/projects/*" \
            ! -name ".*" \
            \( -name "*.html" -o -name "*.css" -o -name "*.js" \) -print0 \
          | while IFS= read -r -d '' f; do
              gzip -knf -9 "$f"
              brotli -fk -q 11 "$f"
            done

      - name: Setup SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.RSYNC_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.RSYNC_SSH_PORT }} -H ${{ secrets.RSYNC_HOST }} >> ~/.ssh/known_hosts

      - name: Generate rsync-exclude.txt from remote markers
        shell: bash
        run: |
          set -euo pipefail

          ssh -p ${{ secrets.RSYNC_SSH_PORT }} \
            ${{ secrets.RSYNC_USER }}@${{ secrets.RSYNC_HOST }} \
            "cd '${{ secrets.RSYNC_DEST_PATH }}' && \
             find . -type f -name '.cicd-pipeline-exclude' -print0 \
             | xargs -0 -n1 dirname \
             | sed 's|^\./|/|; s|$|/|' \
             | sort -u" > rsync-exclude.txt

          printf '%s\n' "$RSYNC_EXCLUDES" >> rsync-exclude.txt

        env:
          RSYNC_EXCLUDES: ${{ vars.RSYNC_EXCLUDES }}

      - name: Deploy via rsync
        shell: bash
        run: |
          set -euo pipefail

          rsync -a \
            -e "ssh -p ${{ secrets.RSYNC_SSH_PORT }}" \
            --delete \
            --exclude-from=rsync-exclude.txt \
            _site/ ${{ secrets.RSYNC_USER }}@${{ secrets.RSYNC_HOST }}:${{ secrets.RSYNC_DEST_PATH }}

      - name: Sync Kirby submodule on remote
        shell: bash
        run: |
          set -euo pipefail

          ssh -p ${{ secrets.RSYNC_SSH_PORT }} \
            ${{ secrets.RSYNC_USER }}@${{ secrets.RSYNC_HOST }} "
              set -euo pipefail

              APP_ROOT='${{ secrets.RSYNC_DEST_PATH }}'
              KIRBY_DIR=\"\$APP_ROOT/kirby/core\"
              KIRBY_URL='${{ steps.kirby_meta.outputs.url }}'
              KIRBY_SHA='${{ steps.kirby_meta.outputs.sha }}'

              mkdir -p \"\$APP_ROOT/kirby\"

              if [ -d \"\$KIRBY_DIR\" ] && [ ! -d \"\$KIRBY_DIR/.git\" ]; then
                echo \"Kirby directory exists but is not a git repo, recreating...\"
                rm -rf \"\$KIRBY_DIR\"
              fi

              if [ ! -d \"\$KIRBY_DIR/.git\" ]; then
                git clone \"\$KIRBY_URL\" \"\$KIRBY_DIR\"
              else
                git -C \"\$KIRBY_DIR\" remote set-url origin \"\$KIRBY_URL\" || true
              fi

              CURRENT_SHA=\"\$(git -C \"\$KIRBY_DIR\" rev-parse HEAD 2>/dev/null || true)\"

              if [ \"\$CURRENT_SHA\" != \"\$KIRBY_SHA\" ]; then
                git -C \"\$KIRBY_DIR\" fetch --all --tags --prune
                git -C \"\$KIRBY_DIR\" -c advice.detachedHead=false checkout --force --quiet \"\$KIRBY_SHA\"

                NEW_SHA=\"\$(git -C \"\$KIRBY_DIR\" rev-parse HEAD 2>/dev/null || true)\"
                EXACT_TAG=\"\$(git -C \"\$KIRBY_DIR\" describe --tags --exact-match 2>/dev/null || true)\"
                DESCRIBE_REF=\"\$(git -C \"\$KIRBY_DIR\" describe --tags --always 2>/dev/null || true)\"
                SHORT_SHA=\"\$(printf '%s' \"\$NEW_SHA\" | cut -c1-7)\"

                if [ -n \"\$EXACT_TAG\" ]; then
                  echo \"Kirby bumped to tag: \$EXACT_TAG (SHA: \$NEW_SHA, matching submodule commit: \$KIRBY_SHA)\"
                elif [ -n \"\$DESCRIBE_REF\" ] && [ \"\$DESCRIBE_REF\" != \"\$SHORT_SHA\" ]; then
                  echo \"Kirby bumped to SHA: \$NEW_SHA (nearest tag: \$DESCRIBE_REF, matching submodule commit: \$KIRBY_SHA)\"
                else
                  echo \"Kirby bumped to SHA: \$NEW_SHA (matching submodule commit: \$KIRBY_SHA)\"
                fi
              else
                EXACT_TAG=\"\$(git -C \"\$KIRBY_DIR\" describe --tags --exact-match 2>/dev/null || true)\"
                DESCRIBE_REF=\"\$(git -C \"\$KIRBY_DIR\" describe --tags --always 2>/dev/null || true)\"
                SHORT_SHA=\"\$(printf '%s' \"\$CURRENT_SHA\" | cut -c1-7)\"

                if [ -n \"\$EXACT_TAG\" ]; then
                  echo \"Kirby already at desired tag: \$EXACT_TAG (SHA: \$CURRENT_SHA, matching submodule commit)\"
                elif [ -n \"\$DESCRIBE_REF\" ] && [ \"\$DESCRIBE_REF\" != \"\$SHORT_SHA\" ]; then
                  echo \"Kirby already at desired SHA: \$CURRENT_SHA (nearest tag: \$DESCRIBE_REF, matching submodule commit)\"
                else
                  echo \"Kirby already at desired SHA: \$CURRENT_SHA (matching submodule commit)\"
                fi
              fi
            "

      - name: Apply deploy map on remote
        shell: bash
        run: |
          set -euo pipefail

          ssh -p ${{ secrets.RSYNC_SSH_PORT }} \
            ${{ secrets.RSYNC_USER }}@${{ secrets.RSYNC_HOST }} \
            "cat > '${{ secrets.RSYNC_DEST_PATH }}/.deploy-map.yml'" < deploy-map.yml

          ssh -p ${{ secrets.RSYNC_SSH_PORT }} \
            ${{ secrets.RSYNC_USER }}@${{ secrets.RSYNC_HOST }} "
              set -euo pipefail
              export APP_ROOT='${{ secrets.RSYNC_DEST_PATH }}'
              export DEPLOY_MAP='${{ secrets.RSYNC_DEST_PATH }}/.deploy-map.yml'

              ruby <<'RUBY'
          require 'yaml'
          require 'fileutils'

          app_root = ENV.fetch('APP_ROOT')
          map_file = ENV.fetch('DEPLOY_MAP')

          abort(\"Missing deploy map: #{map_file}\") unless File.file?(map_file)

          map = YAML.load_file(map_file) || {}

          normalize_rel = lambda do |value|
            value.to_s.strip.sub(%r{^/+}, '').sub(%r{/+$}, '')
          end

          set_mode = lambda do |path, mode|
            next if mode.nil?
            mode_str = mode.to_s.strip
            next if mode_str.empty?
            File.chmod(mode_str.to_i(8), path)
          end

          Array(map['dirs']).each do |item|
            item = { 'path' => item } if item.is_a?(String)
            abort('Invalid dirs entry') unless item.is_a?(Hash)

            rel = normalize_rel.call(item['path'])
            next if rel.empty?

            full = File.join(app_root, rel)

            if File.exist?(full) && !File.directory?(full)
              abort(\"Refusing to replace non-directory path: #{full}\")
            end

            unless File.directory?(full)
              FileUtils.mkdir_p(full)
              puts \"created dir: #{rel}\"
            else
              puts \"dir ok: #{rel}\"
            end

            set_mode.call(full, item['mode'])
          end

          Array(map['files']).each do |item|
            abort('Invalid files entry') unless item.is_a?(Hash)

            rel = normalize_rel.call(item['path'])
            next if rel.empty?

            full = File.join(app_root, rel)
            parent = File.dirname(full)
            content = item.key?('content') ? item['content'].to_s : ''

            if File.directory?(full)
              abort(\"Refusing to replace directory with file: #{full}\")
            end

            FileUtils.mkdir_p(parent) unless Dir.exist?(parent)

            if File.symlink?(full)
              abort(\"Refusing to replace symlink with file: #{full}\")
            end

            if File.file?(full)
              current = File.read(full)
              if current == content
                puts \"file ok: #{rel}\"
              else
                File.write(full, content)
                puts \"updated file: #{rel}\"
              end
            else
              File.write(full, content)
              puts \"created file: #{rel}\"
            end

            set_mode.call(full, item['mode'])
          end

          Array(map['symlinks']).each do |item|
            abort('Invalid symlinks entry') unless item.is_a?(Hash)

            link = normalize_rel.call(item['link'])
            target = item['target'].to_s.strip.sub(%r{/+$}, '')
            next if link.empty? || target.empty?

            full_link = File.join(app_root, link)

            if File.symlink?(full_link)
              current = File.readlink(full_link)
              if current == target
                puts \"symlink ok: #{link} -> #{target}\"
                next
              end

              File.delete(full_link)
            elsif File.exist?(full_link)
              abort(\"Refusing to replace non-symlink path: #{full_link}\")
            end

            File.symlink(target, full_link)
            puts \"created symlink: #{link} -> #{target}\"
          end

          File.delete(map_file) if File.file?(map_file)
          RUBY
            "

      - name: Verify remote identity JSON files match build
        shell: bash
        run: |
          set -euo pipefail

          L_SCHEMAS="$(sha256sum _site/.well-known/identity/schemas.json | awk '{print $1}')"
          L_MANIFEST="$(sha256sum _site/.well-known/identity/manifest.json | awk '{print $1}')"

          echo "LOCAL schemas.json  $L_SCHEMAS"
          echo "LOCAL manifest.json $L_MANIFEST"

          R_SCHEMAS="$(ssh -p ${{ secrets.RSYNC_SSH_PORT }} ${{ secrets.RSYNC_USER }}@${{ secrets.RSYNC_HOST }} \
            "sha256sum '${{ secrets.RSYNC_DEST_PATH }}/.well-known/identity/schemas.json' | awk '{print \$1}'")"
          R_MANIFEST="$(ssh -p ${{ secrets.RSYNC_SSH_PORT }} ${{ secrets.RSYNC_USER }}@${{ secrets.RSYNC_HOST }} \
            "sha256sum '${{ secrets.RSYNC_DEST_PATH }}/.well-known/identity/manifest.json' | awk '{print \$1}'")"

          echo "REMOTE schemas.json  $R_SCHEMAS"
          echo "REMOTE manifest.json $R_MANIFEST"

          [ "$L_SCHEMAS" = "$R_SCHEMAS" ] || { echo "ERROR: schemas.json mismatch after deploy"; exit 1; }
          [ "$L_MANIFEST" = "$R_MANIFEST" ] || { echo "ERROR: manifest.json mismatch after deploy"; exit 1; }

      - name: Update identity DNS (meta + pgp + ssh) and verify via DoH
        shell: bash
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_NAME: ${{ secrets.CF_ZONE_NAME }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          SCHEMAS_URL: ${{ secrets.IDENTITY_SCHEMAS_URL }}
          MANIFEST_URL: ${{ secrets.IDENTITY_MANIFEST_URL }}
          IDENTITY_META_FQDN: ${{ secrets.IDENTITY_META_FQDN }}
          IDENTITY_DNS_COMMENT: managed-by=identityctl;cleanup=keep;source=github-actions-deploy-${{ github.run_id }}
          MAX_TRIES: "60"
          SLEEP_S: "3"
        run: |
          set -euo pipefail
          unset http_proxy https_proxy HTTP_PROXY HTTPS_PROXY ALL_PROXY all_proxy NO_PROXY no_proxy

          chmod +x bin/identityctl

          normalize_txt() {
            local txt="${1:-}"
            txt="$(printf '%s' "$txt" | sed 's/\\"/"/g')"
            if printf '%s' "$txt" | grep -q '"'; then
              local out=""
              while IFS= read -r seg; do out="${out}${seg}"; done < <(printf '%s' "$txt" | grep -Po '"\K[^"]*(?=")' || true)
              txt="$out"
            fi
            txt="$(printf '%s' "$txt" | tr -d '\n' | tr -d '\r' | tr -d '[:space:]')"
            printf '%s' "$txt"
          }

          doh_get_txt_ad() {
            local provider="$1"
            local name="$2"

            local url=""
            if [ "$provider" = "cf" ]; then
              url="https://cloudflare-dns.com/dns-query?name=${name}&type=TXT&do=1&cd=0"
            else
              url="https://dns.google/resolve?name=${name}&type=TXT&do=1&cd=0"
            fi

            local json
            json="$(curl -fsSL -H 'accept: application/dns-json' "$url")"

            local ad status
            ad="$(printf '%s' "$json" | jq -r '(.AD // .ad) // empty')"
            status="$(printf '%s' "$json" | jq -r '(.Status // .status) // empty')"

            [ "$ad" = "true" ] || { echo "ERROR: DoH ${provider} missing AD=true" >&2; return 2; }
            [ "$status" = "0" ] || { echo "ERROR: DoH ${provider} Status=${status}" >&2; return 3; }

            local raw
            raw="$(printf '%s' "$json" | jq -r '(.Answer // .answer // [])[] | select((.type // .Type)==16) | (.data // .Data) ' | head -n1)"
            [ -n "$raw" ] || { echo "ERROR: DoH ${provider} no TXT data" >&2; return 4; }

            normalize_txt "$raw"
          }

          wait_dns_txt() {
            local fqdn=""
            local want=""
            local -a hard_providers=()
            local -a soft_providers=()

            while [ $# -gt 0 ]; do
              case "$1" in
                --fqdn) fqdn="$2"; shift 2 ;;
                --want) want="$2"; shift 2 ;;
                --hard) hard_providers+=("$2"); shift 2 ;;
                --soft) soft_providers+=("$2"); shift 2 ;;
                *) echo "ERROR: unknown arg: $1" >&2; return 2 ;;
              esac
            done

            [ -n "$fqdn" ] || { echo "ERROR: --fqdn is required" >&2; return 2; }
            [ -n "$want" ] || { echo "ERROR: --want is required" >&2; return 2; }
            [ "${#hard_providers[@]}" -gt 0 ] || { echo "ERROR: at least one --hard provider is required" >&2; return 2; }

            check_provider_eq() {
              local provider="$1"
              local got=""
              got="$(doh_get_txt_ad "$provider" "$fqdn")" || return 1
              echo "DoH ${provider} (${fqdn}): $got"
              [ "$got" = "$want" ]
            }

            wait_provider() {
              local provider="$1"
              local mode="$2"
              local tries="${MAX_TRIES:-40}"
              local sleep_s="${SLEEP_S:-3}"
              local ok=0

              for i in $(seq 1 "$tries"); do
                echo "Check ${provider} DoH ${fqdn} (${i}/${tries})..."
                if check_provider_eq "$provider"; then
                  ok=1
                  break
                fi
                sleep "$sleep_s"
              done

              if [ "$ok" -eq 1 ]; then
                echo "OK: ${provider} DoH matches for ${fqdn}."
                return 0
              fi

              if [ "$mode" = "hard" ]; then
                echo "ERROR: ${provider} DoH did not converge for ${fqdn} after ${tries} tries." >&2
                echo "EXPECTED: $want" >&2
                exit 1
              fi

              echo "::warning::${provider} DoH did not converge for ${fqdn} after ${tries} tries."
              echo "::warning::EXPECTED: $want"
              local now=""
              now="$(doh_get_txt_ad "$provider" "$fqdn" 2>/dev/null || true)"
              if [ -n "$now" ]; then
                echo "::warning::${provider} current (${fqdn}): $now"
              fi
            }

            local p
            for p in "${hard_providers[@]}"; do
              wait_provider "$p" hard
            done

            for p in "${soft_providers[@]}"; do
              wait_provider "$p" soft
            done
          }

          ROOT="_site/.well-known/identity"

          WANT_META="$(bin/identityctl meta-txt --root "$ROOT" --raw)"
          WANT_META_NORM="$(printf '%s' "$WANT_META" | tr -d '[:space:]')"
          echo "WANT_META_NORM=$WANT_META_NORM"

          echo "Upsert meta TXT -> ${IDENTITY_META_FQDN}"
          bin/identityctl cf-set-meta --name "${IDENTITY_META_FQDN}" --ttl 120 --comment "${IDENTITY_DNS_COMMENT}" --root "$ROOT" --raw

          wait_dns_txt --fqdn "${IDENTITY_META_FQDN}" --want "${WANT_META_NORM}" --hard cf --soft gg

          bin/identityctl cf-apply-keys --type pgp --ttl 120 --comment "${IDENTITY_DNS_COMMENT}" --root "$ROOT"
          bin/identityctl cf-prune-keys --type pgp --root "$ROOT"

          bin/identityctl cf-apply-keys --type ssh  --ttl 120 --comment "${IDENTITY_DNS_COMMENT}" --root "$ROOT"
          bin/identityctl cf-prune-keys --type ssh --root "$ROOT"

          CUR_PGP="$(jq -r '.pgp.current' "$ROOT/manifest.json")"
          CUR_SSH="$(jq -r '.ssh.current' "$ROOT/manifest.json")"

          WANT_PGP_ALIAS="$(bin/identityctl key-txt --type pgp --ver "$CUR_PGP" --root "$ROOT" | tr -d '[:space:]')"
          WANT_SSH_ALIAS="$(bin/identityctl key-txt --type ssh --ver "$CUR_SSH" --root "$ROOT" | tr -d '[:space:]')"

          wait_dns_txt --fqdn "pgp._identity.${CF_ZONE_NAME}" --want "$WANT_PGP_ALIAS" --hard cf --soft gg
          wait_dns_txt --fqdn "ssh._identity.${CF_ZONE_NAME}" --want "$WANT_SSH_ALIAS" --hard cf --soft gg

          echo "OK: Identity DNS updated (meta + pgp + ssh), pruned, and aliases verified via CF DoH (AD=true)."
