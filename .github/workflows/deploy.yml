name: Build and Deploy Jekyll via rsync

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Resolve Kirby submodule metadata
        id: kirby_meta
        shell: bash
        run: |
          set -euo pipefail

          KIRBY_URL="$(git config --file .gitmodules --get submodule.kirby/core.url)"
          KIRBY_SHA="$(git ls-tree HEAD kirby/core | awk '{print $3}')"

          printf 'url=%s\n' "$KIRBY_URL" >> "$GITHUB_OUTPUT"
          printf 'sha=%s\n' "$KIRBY_SHA" >> "$GITHUB_OUTPUT"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ secrets.RUBY_VERSION }}
          bundler-cache: false

      - name: Cache Ruby gems
        uses: actions/cache@v5
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-

      - name: Install dependencies
        run: |
          set -euo pipefail
          gem install bundler
          bundle config set path 'vendor/bundle'
          bundle install --jobs 4 --retry 3

      - name: Set up Node.js (for minifiers)
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install minifiers
        run: |
          set -euo pipefail
          npm i -g terser clean-css-cli

      - name: Minify JS (assets/js/*.js -> *.min.js)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          for f in assets/js/*.js; do
            case "$f" in
              *.min.js)
                echo "Skipping already minified: $f"
                ;;
              *)
                out="${f%.js}.min.js"
                echo "Minifying $f -> $out"
                terser "$f" -c -m --comments false -o "$out"
                ;;
            esac
          done

      - name: Minify CSS (assets/css/*.css -> *.min.css)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          for f in assets/css/*.css; do
            case "$f" in
              *.min.css)
                echo "Skipping already minified: $f"
                ;;
              *)
                out="${f%.css}.min.css"
                echo "Minifying $f -> $out"
                cleancss -O2 -o "$out" "$f"
                ;;
            esac
          done

      - name: Generate deploy config
        shell: bash
        run: |
          set -euo pipefail
          VER="${GITHUB_SHA}"
          TS="$(date +%s%6N)"
          printf 'asset_build:\n  version: "%s"\n  timestamp: "%s"\napp_env: "production"\n' "$VER" "$TS" > _config.deploy.yml

      - name: Build Jekyll site
        run: bundle exec jekyll build --config _config.yml,_config.deploy.yml
        env:
          JEKYLL_ENV: production

      - name: Precompress assets in _site (gzip + brotli)
        shell: bash
        run: |
          set -euo pipefail
          find _site -type f \
            ! -path "_site/projects/*" \
            ! -name ".*" \
            \( -name "*.html" -o -name "*.css" -o -name "*.js" \) -print0 \
          | while IFS= read -r -d '' f; do
              gzip -knf -9 "$f"
              brotli -fk -q 11 "$f"
            done

      - name: Setup SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.RSYNC_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.RSYNC_SSH_PORT }} -H ${{ secrets.RSYNC_HOST }} >> ~/.ssh/known_hosts

      - name: Generate rsync-exclude.txt from remote markers
        shell: bash
        run: |
          set -euo pipefail

          ssh -p ${{ secrets.RSYNC_SSH_PORT }} \
            ${{ secrets.RSYNC_USER }}@${{ secrets.RSYNC_HOST }} \
            "cd '${{ secrets.RSYNC_DEST_PATH }}' && \
             find . -type f -name '.cicd-pipeline-exclude' -print0 \
             | xargs -0 -n1 dirname \
             | sed 's|^\./|/|; s|$|/|' \
             | sort -u" > rsync-exclude.txt

          printf '%s\n' "$RSYNC_EXCLUDES" >> rsync-exclude.txt

        env:
          RSYNC_EXCLUDES: ${{ vars.RSYNC_EXCLUDES }}

      - name: Deploy via rsync
        shell: bash
        run: |
          set -euo pipefail

          rsync -a \
            -e "ssh -p ${{ secrets.RSYNC_SSH_PORT }}" \
            --delete \
            --exclude-from=rsync-exclude.txt \
            _site/ ${{ secrets.RSYNC_USER }}@${{ secrets.RSYNC_HOST }}:${{ secrets.RSYNC_DEST_PATH }}

      - name: Sync Kirby submodule on remote
        shell: bash
        run: |
          set -euo pipefail

          ssh -p ${{ secrets.RSYNC_SSH_PORT }} \
            ${{ secrets.RSYNC_USER }}@${{ secrets.RSYNC_HOST }} "
              set -euo pipefail

              APP_ROOT='${{ secrets.RSYNC_DEST_PATH }}'
              KIRBY_DIR=\"\$APP_ROOT/kirby/core\"
              KIRBY_URL='${{ steps.kirby_meta.outputs.url }}'
              KIRBY_SHA='${{ steps.kirby_meta.outputs.sha }}'

              mkdir -p \"\$APP_ROOT/kirby\"

              if [ -d \"\$KIRBY_DIR\" ] && [ ! -d \"\$KIRBY_DIR/.git\" ]; then
                echo \"Kirby directory exists but is not a git repo, recreating...\"
                rm -rf \"\$KIRBY_DIR\"
              fi

              if [ ! -d \"\$KIRBY_DIR/.git\" ]; then
                git clone \"\$KIRBY_URL\" \"\$KIRBY_DIR\"
              else
                git -C \"\$KIRBY_DIR\" remote set-url origin \"\$KIRBY_URL\" || true
              fi

              CURRENT_SHA=\"\$(git -C \"\$KIRBY_DIR\" rev-parse HEAD 2>/dev/null || true)\"

              if [ \"\$CURRENT_SHA\" != \"\$KIRBY_SHA\" ]; then
                git -C \"\$KIRBY_DIR\" fetch --all --tags --prune
                git -C \"\$KIRBY_DIR\" -c advice.detachedHead=false checkout --force --quiet \"\$KIRBY_SHA\"

                NEW_SHA=\"\$(git -C \"\$KIRBY_DIR\" rev-parse HEAD 2>/dev/null || true)\"
                EXACT_TAG=\"\$(git -C \"\$KIRBY_DIR\" describe --tags --exact-match 2>/dev/null || true)\"
                DESCRIBE_REF=\"\$(git -C \"\$KIRBY_DIR\" describe --tags --always 2>/dev/null || true)\"
                SHORT_SHA=\"\$(printf '%s' \"\$NEW_SHA\" | cut -c1-7)\"

                if [ -n \"\$EXACT_TAG\" ]; then
                  echo \"Kirby bumped to tag: \$EXACT_TAG (SHA: \$NEW_SHA, matching submodule commit: \$KIRBY_SHA)\"
                elif [ -n \"\$DESCRIBE_REF\" ] && [ \"\$DESCRIBE_REF\" != \"\$SHORT_SHA\" ]; then
                  echo \"Kirby bumped to SHA: \$NEW_SHA (nearest tag: \$DESCRIBE_REF, matching submodule commit: \$KIRBY_SHA)\"
                else
                  echo \"Kirby bumped to SHA: \$NEW_SHA (matching submodule commit: \$KIRBY_SHA)\"
                fi
              else
                EXACT_TAG=\"\$(git -C \"\$KIRBY_DIR\" describe --tags --exact-match 2>/dev/null || true)\"
                DESCRIBE_REF=\"\$(git -C \"\$KIRBY_DIR\" describe --tags --always 2>/dev/null || true)\"
                SHORT_SHA=\"\$(printf '%s' \"\$CURRENT_SHA\" | cut -c1-7)\"

                if [ -n \"\$EXACT_TAG\" ]; then
                  echo \"Kirby already at desired tag: \$EXACT_TAG (SHA: \$CURRENT_SHA, matching submodule commit)\"
                elif [ -n \"\$DESCRIBE_REF\" ] && [ \"\$DESCRIBE_REF\" != \"\$SHORT_SHA\" ]; then
                  echo \"Kirby already at desired SHA: \$CURRENT_SHA (nearest tag: \$DESCRIBE_REF, matching submodule commit)\"
                else
                  echo \"Kirby already at desired SHA: \$CURRENT_SHA (matching submodule commit)\"
                fi
              fi
            "

      - name: Install PyYAML
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install PyYAML

      - name: Generate deploy map artifacts
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          import base64
          import json
          import shlex
          from pathlib import Path

          import yaml

          root = Path("deploy-map.yml")
          if not root.is_file():
              raise SystemExit("deploy-map.yml not found")

          with root.open("r", encoding="utf-8") as f:
              data = yaml.safe_load(f) or {}

          if not isinstance(data, dict):
              raise SystemExit("deploy-map.yml must contain a mapping at root")

          data["dirs"] = data.get("dirs") or []
          data["files"] = data.get("files") or []
          data["symlinks"] = data.get("symlinks") or []

          for key in ("dirs", "files", "symlinks"):
              value = data.get(key)
              if value is None:
                  data[key] = []
              elif not isinstance(value, list):
                  raise SystemExit(f"{key} must be a list")

          Path("deploy-map.json").write_text(
              json.dumps(data, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )

          def norm_rel(value: object) -> str:
              return str(value or "").strip().strip("/")

          def shq(value: str) -> str:
              return shlex.quote(value)

          lines: list[str] = []
          lines.append("#!/usr/bin/env bash")
          lines.append("set -euo pipefail")
          lines.append(': "${APP_ROOT:?APP_ROOT is required}"')
          lines.append('RESULT_FILE="$APP_ROOT/.deploy-map.result.json"')
          lines.append('TMP_RESULTS="$APP_ROOT/.deploy-map.result.jsonl"')
          lines.append('OVERALL_SUCCESS=true')
          lines.append('rm -f "$TMP_RESULTS"')

          lines.extend([
              "json_escape() {",
              '  local s="${1-}"',
              r'''  s="${s//\\/\\\\}"''',
              r'''  s="${s//\"/\\\"}"''',
              r'''  s="${s//$'\n'/\\n}"''',
              r'''  s="${s//$'\r'/\\r}"''',
              r'''  s="${s//$'\t'/\\t}"''',
              '''  printf '%s' "$s"''',
              "}",
              "",
              "json_string_or_null() {",
              '  local s="${1-}"',
              '  if [ -z "$s" ]; then',
              "    printf 'null'",
              "  else",
              '''    printf '"%s"' "$(json_escape "$s")"''',
              "  fi",
              "}",
              "",
              "append_result() {",
              '  local type="${1-}"',
              '  local path="${2-}"',
              '  local link="${3-}"',
              '  local target="${4-}"',
              '  local command="${5-}"',
              '  local rc="${6-0}"',
              '  local success="${7-false}"',
              '  local changed="${8-false}"',
              '  local error="${9-}"',
              "  {",
              "    printf '{'",
              '''    printf '"type":"%s",' "$(json_escape "$type")"''',
              '''    printf '"path":%s,' "$(json_string_or_null "$path")"''',
              '''    printf '"link":%s,' "$(json_string_or_null "$link")"''',
              '''    printf '"target":%s,' "$(json_string_or_null "$target")"''',
              '''    printf '"command":%s,' "$(json_string_or_null "$command")"''',
              '''    printf '"rc":%s,' "$rc"''',
              '''    printf '"success":%s,' "$success"''',
              '''    printf '"changed":%s,' "$changed"''',
              '''    printf '"error":%s' "$(json_string_or_null "$error")"''',
              r"""    printf '}\n'""",
              '  } >> "$TMP_RESULTS"',
              "}",
              "",
              "write_result_file() {",
              "  {",
              r"""    printf '{\n'""",
              '''    printf '  "success": %s,\n' "$OVERALL_SUCCESS"''',
              '''    printf '  "app_root": "%s",\n' "$(json_escape "$APP_ROOT")"''',
              r"""    printf '  "results": [\n'""",
              "    first=1",
              '    if [ -f "$TMP_RESULTS" ]; then',
              '      while IFS= read -r line; do',
              '        [ -n "$line" ] || continue',
              '        if [ "$first" -eq 0 ]; then',
              r"""          printf ',\n'""",
              "        fi",
              '''        printf '    %s' "$line"''',
              "        first=0",
              '      done < "$TMP_RESULTS"',
              "    fi",
              r"""    printf '\n  ]\n'""",
              r"""    printf '}\n'""",
              '  } > "$RESULT_FILE"',
              "}",
              "",
              "fail_now() {",
              "  OVERALL_SUCCESS=false",
              "  write_result_file",
              "  exit 1",
              "}",
          ])

          for item in data["dirs"]:
              if isinstance(item, str):
                  item = {"path": item}
              if not isinstance(item, dict):
                  raise SystemExit("Invalid dirs entry")

              rel = norm_rel(item.get("path", ""))
              if not rel:
                  continue

              mode = str(item.get("mode", "")).strip()
              lines.append(f"rel={shq(rel)}")
              lines.append('full="$APP_ROOT/$rel"')
              lines.append('command="mkdir -p $full"')
              lines.append('changed=false')
              lines.append('if [ -e "$full" ] && [ ! -d "$full" ]; then')
              lines.append('  append_result "dir" "$rel" "" "" "$command" 1 false false "Refusing to replace non-directory path: $full"')
              lines.append('  fail_now')
              lines.append('fi')
              lines.append('if [ ! -d "$full" ]; then')
              lines.append('  mkdir -p "$full"')
              lines.append('  changed=true')
              lines.append('fi')
              if mode:
                  lines.append(f'chmod {shq(mode)} "$full"')
              lines.append('append_result "dir" "$rel" "" "" "$command" 0 true "$changed" ""')

          for item in data["files"]:
              if not isinstance(item, dict):
                  raise SystemExit("Invalid files entry")

              rel = norm_rel(item.get("path", ""))
              if not rel:
                  continue

              mode = str(item.get("mode", "")).strip()
              content = str(item.get("content", ""))
              encoded = base64.b64encode(content.encode("utf-8")).decode("ascii")

              lines.append(f"rel={shq(rel)}")
              lines.append('full="$APP_ROOT/$rel"')
              lines.append('parent="$(dirname "$full")"')
              lines.append('command="write file $full"')
              lines.append('changed=true')
              lines.append('if [ -d "$full" ]; then')
              lines.append('  append_result "file" "$rel" "" "" "$command" 1 false false "Refusing to replace directory with file: $full"')
              lines.append('  fail_now')
              lines.append('fi')
              lines.append('if [ -L "$full" ]; then')
              lines.append('  append_result "file" "$rel" "" "" "$command" 1 false false "Refusing to replace symlink with file: $full"')
              lines.append('  fail_now')
              lines.append('fi')
              lines.append('mkdir -p "$parent"')
              lines.append('tmp="$full.tmp"')
              lines.append(f"printf '%s' {shq(encoded)} | base64 -d > \"$tmp\"")
              lines.append('if [ -f "$full" ] && cmp -s "$tmp" "$full"; then')
              lines.append('  changed=false')
              lines.append('  rm -f "$tmp"')
              lines.append('else')
              lines.append('  mv "$tmp" "$full"')
              lines.append('fi')
              if mode:
                  lines.append(f'chmod {shq(mode)} "$full"')
              lines.append('append_result "file" "$rel" "" "" "$command" 0 true "$changed" ""')

          for item in data["symlinks"]:
              if not isinstance(item, dict):
                  raise SystemExit("Invalid symlinks entry")

              link = norm_rel(item.get("link", ""))
              target = str(item.get("target", "")).strip().rstrip("/")
              if not link or not target:
                  continue

              lines.append(f"link_rel={shq(link)}")
              lines.append(f"target={shq(target)}")
              lines.append('full_link="$APP_ROOT/$link_rel"')
              lines.append('command="ln -s $target $full_link"')
              lines.append('changed=false')
              lines.append('if [ -L "$full_link" ]; then')
              lines.append('  current="$(readlink "$full_link")"')
              lines.append('  if [ "$current" != "$target" ]; then')
              lines.append('    rm -f "$full_link"')
              lines.append('    ln -s "$target" "$full_link"')
              lines.append('    changed=true')
              lines.append('  fi')
              lines.append('elif [ -e "$full_link" ]; then')
              lines.append('  append_result "symlink" "" "$link_rel" "$target" "$command" 1 false false "Refusing to replace non-symlink path: $full_link"')
              lines.append('  fail_now')
              lines.append('else')
              lines.append('  ln -s "$target" "$full_link"')
              lines.append('  changed=true')
              lines.append('fi')
              lines.append('append_result "symlink" "" "$link_rel" "$target" "$command" 0 true "$changed" ""')

          lines.append("write_result_file")

          Path("deploy-map.apply.sh").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

          chmod +x deploy-map.apply.sh

      - name: Upload deploy map artifacts
        shell: bash
        run: |
          set -euo pipefail

          ssh -p ${{ secrets.RSYNC_SSH_PORT }} \
            ${{ secrets.RSYNC_USER }}@${{ secrets.RSYNC_HOST }} \
            "cat > '${{ secrets.RSYNC_DEST_PATH }}/.deploy-map.json'" < deploy-map.json

          ssh -p ${{ secrets.RSYNC_SSH_PORT }} \
            ${{ secrets.RSYNC_USER }}@${{ secrets.RSYNC_HOST }} \
            "cat > '${{ secrets.RSYNC_DEST_PATH }}/.deploy-map.apply.sh'" < deploy-map.apply.sh

          ssh -p ${{ secrets.RSYNC_SSH_PORT }} \
            ${{ secrets.RSYNC_USER }}@${{ secrets.RSYNC_HOST }} \
            "chmod 700 '${{ secrets.RSYNC_DEST_PATH }}/.deploy-map.apply.sh'"

      - name: Apply deploy map on remote
        shell: bash
        run: |
          set -euo pipefail

          ssh -p ${{ secrets.RSYNC_SSH_PORT }} \
            ${{ secrets.RSYNC_USER }}@${{ secrets.RSYNC_HOST }} \
            "APP_ROOT='${{ secrets.RSYNC_DEST_PATH }}' '${{ secrets.RSYNC_DEST_PATH }}/.deploy-map.apply.sh'"

      - name: Show remote deploy map result
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          RESULT_JSON="$(
            ssh -p ${{ secrets.RSYNC_SSH_PORT }} \
              ${{ secrets.RSYNC_USER }}@${{ secrets.RSYNC_HOST }} "
                RESULT='${{ secrets.RSYNC_DEST_PATH }}/.deploy-map.result.json'
                if [ -f \"\$RESULT\" ]; then
                  cat \"\$RESULT\"
                else
                  echo ''
                fi
              "
          )"

          if [ -n "$RESULT_JSON" ]; then
            printf '%s\n' "$RESULT_JSON" | jq .
          else
            echo 'deploy map result file not found'
          fi

      - name: Verify remote identity JSON files match build
        shell: bash
        run: |
          set -euo pipefail

          L_SCHEMAS="$(sha256sum _site/.well-known/identity/schemas.json | awk '{print $1}')"
          L_MANIFEST="$(sha256sum _site/.well-known/identity/manifest.json | awk '{print $1}')"

          echo "LOCAL schemas.json  $L_SCHEMAS"
          echo "LOCAL manifest.json $L_MANIFEST"

          R_SCHEMAS="$(ssh -p ${{ secrets.RSYNC_SSH_PORT }} ${{ secrets.RSYNC_USER }}@${{ secrets.RSYNC_HOST }} \
            "sha256sum '${{ secrets.RSYNC_DEST_PATH }}/.well-known/identity/schemas.json' | awk '{print \$1}'")"
          R_MANIFEST="$(ssh -p ${{ secrets.RSYNC_SSH_PORT }} ${{ secrets.RSYNC_USER }}@${{ secrets.RSYNC_HOST }} \
            "sha256sum '${{ secrets.RSYNC_DEST_PATH }}/.well-known/identity/manifest.json' | awk '{print \$1}'")"

          echo "REMOTE schemas.json  $R_SCHEMAS"
          echo "REMOTE manifest.json $R_MANIFEST"

          [ "$L_SCHEMAS" = "$R_SCHEMAS" ] || { echo "ERROR: schemas.json mismatch after deploy"; exit 1; }
          [ "$L_MANIFEST" = "$R_MANIFEST" ] || { echo "ERROR: manifest.json mismatch after deploy"; exit 1; }

      - name: Update identity DNS (meta + pgp + ssh) and verify via DoH
        shell: bash
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_NAME: ${{ secrets.CF_ZONE_NAME }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          SCHEMAS_URL: ${{ secrets.IDENTITY_SCHEMAS_URL }}
          MANIFEST_URL: ${{ secrets.IDENTITY_MANIFEST_URL }}
          IDENTITY_META_FQDN: ${{ secrets.IDENTITY_META_FQDN }}
          IDENTITY_DNS_COMMENT: managed-by=identityctl;cleanup=keep;source=github-actions-deploy-${{ github.run_id }}
          MAX_TRIES: "60"
          SLEEP_S: "3"
        run: |
          set -euo pipefail
          unset http_proxy https_proxy HTTP_PROXY HTTPS_PROXY ALL_PROXY all_proxy NO_PROXY no_proxy

          chmod +x bin/identityctl

          normalize_txt() {
            local txt="${1:-}"
            txt="$(printf '%s' "$txt" | sed 's/\\"/"/g')"
            if printf '%s' "$txt" | grep -q '"'; then
              local out=""
              while IFS= read -r seg; do out="${out}${seg}"; done < <(printf '%s' "$txt" | grep -Po '"\K[^"]*(?=")' || true)
              txt="$out"
            fi
            txt="$(printf '%s' "$txt" | tr -d '\n' | tr -d '\r' | tr -d '[:space:]')"
            printf '%s' "$txt"
          }

          doh_get_txt_ad() {
            local provider="$1"
            local name="$2"

            local url=""
            if [ "$provider" = "cf" ]; then
              url="https://cloudflare-dns.com/dns-query?name=${name}&type=TXT&do=1&cd=0"
            else
              url="https://dns.google/resolve?name=${name}&type=TXT&do=1&cd=0"
            fi

            local json
            json="$(curl -fsSL -H 'accept: application/dns-json' "$url")"

            local ad status
            ad="$(printf '%s' "$json" | jq -r '(.AD // .ad) // empty')"
            status="$(printf '%s' "$json" | jq -r '(.Status // .status) // empty')"

            [ "$ad" = "true" ] || { echo "ERROR: DoH ${provider} missing AD=true" >&2; return 2; }
            [ "$status" = "0" ] || { echo "ERROR: DoH ${provider} Status=${status}" >&2; return 3; }

            local raw
            raw="$(printf '%s' "$json" | jq -r '(.Answer // .answer // [])[] | select((.type // .Type)==16) | (.data // .Data) ' | head -n1)"
            [ -n "$raw" ] || { echo "ERROR: DoH ${provider} no TXT data" >&2; return 4; }

            normalize_txt "$raw"
          }

          wait_dns_txt() {
            local fqdn=""
            local want=""
            local -a hard_providers=()
            local -a soft_providers=()

            while [ $# -gt 0 ]; do
              case "$1" in
                --fqdn) fqdn="$2"; shift 2 ;;
                --want) want="$2"; shift 2 ;;
                --hard) hard_providers+=("$2"); shift 2 ;;
                --soft) soft_providers+=("$2"); shift 2 ;;
                *) echo "ERROR: unknown arg: $1" >&2; return 2 ;;
              esac
            done

            [ -n "$fqdn" ] || { echo "ERROR: --fqdn is required" >&2; return 2; }
            [ -n "$want" ] || { echo "ERROR: --want is required" >&2; return 2; }
            [ "${#hard_providers[@]}" -gt 0 ] || { echo "ERROR: at least one --hard provider is required" >&2; return 2; }

            check_provider_eq() {
              local provider="$1"
              local got=""
              got="$(doh_get_txt_ad "$provider" "$fqdn")" || return 1
              echo "DoH ${provider} (${fqdn}): $got"
              [ "$got" = "$want" ]
            }

            wait_provider() {
              local provider="$1"
              local mode="$2"
              local tries="${MAX_TRIES:-40}"
              local sleep_s="${SLEEP_S:-3}"
              local ok=0

              for i in $(seq 1 "$tries"); do
                echo "Check ${provider} DoH ${fqdn} (${i}/${tries})..."
                if check_provider_eq "$provider"; then
                  ok=1
                  break
                fi
                sleep "$sleep_s"
              done

              if [ "$ok" -eq 1 ]; then
                echo "OK: ${provider} DoH matches for ${fqdn}."
                return 0
              fi

              if [ "$mode" = "hard" ]; then
                echo "ERROR: ${provider} DoH did not converge for ${fqdn} after ${tries} tries." >&2
                echo "EXPECTED: $want" >&2
                exit 1
              fi

              echo "::warning::${provider} DoH did not converge for ${fqdn} after ${tries} tries."
              echo "::warning::EXPECTED: $want"
              local now=""
              now="$(doh_get_txt_ad "$provider" "$fqdn" 2>/dev/null || true)"
              if [ -n "$now" ]; then
                echo "::warning::${provider} current (${fqdn}): $now"
              fi
            }

            local p
            for p in "${hard_providers[@]}"; do
              wait_provider "$p" hard
            done

            for p in "${soft_providers[@]}"; do
              wait_provider "$p" soft
            done
          }

          ROOT="_site/.well-known/identity"

          WANT_META="$(bin/identityctl meta-txt --root "$ROOT" --raw)"
          WANT_META_NORM="$(printf '%s' "$WANT_META" | tr -d '[:space:]')"
          echo "WANT_META_NORM=$WANT_META_NORM"

          echo "Upsert meta TXT -> ${IDENTITY_META_FQDN}"
          bin/identityctl cf-set-meta --name "${IDENTITY_META_FQDN}" --ttl 120 --comment "${IDENTITY_DNS_COMMENT}" --root "$ROOT" --raw

          wait_dns_txt --fqdn "${IDENTITY_META_FQDN}" --want "${WANT_META_NORM}" --hard cf --soft gg

          bin/identityctl cf-apply-keys --type pgp --ttl 120 --comment "${IDENTITY_DNS_COMMENT}" --root "$ROOT"
          bin/identityctl cf-prune-keys --type pgp --root "$ROOT"

          bin/identityctl cf-apply-keys --type ssh  --ttl 120 --comment "${IDENTITY_DNS_COMMENT}" --root "$ROOT"
          bin/identityctl cf-prune-keys --type ssh --root "$ROOT"

          CUR_PGP="$(jq -r '.pgp.current' "$ROOT/manifest.json")"
          CUR_SSH="$(jq -r '.ssh.current' "$ROOT/manifest.json")"

          WANT_PGP_ALIAS="$(bin/identityctl key-txt --type pgp --ver "$CUR_PGP" --root "$ROOT" | tr -d '[:space:]')"
          WANT_SSH_ALIAS="$(bin/identityctl key-txt --type ssh --ver "$CUR_SSH" --root "$ROOT" | tr -d '[:space:]')"

          wait_dns_txt --fqdn "pgp._identity.${CF_ZONE_NAME}" --want "$WANT_PGP_ALIAS" --hard cf --soft gg
          wait_dns_txt --fqdn "ssh._identity.${CF_ZONE_NAME}" --want "$WANT_SSH_ALIAS" --hard cf --soft gg

          echo "OK: Identity DNS updated (meta + pgp + ssh), pruned, and aliases verified via CF DoH (AD=true)."
