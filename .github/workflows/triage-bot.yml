name: Triage Bot

on:
  issues:
    types: [opened, edited, labeled, unlabeled, reopened, assigned, unassigned]
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review, converted_to_draft, labeled, unlabeled]
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run without write operations'
        required: false
        default: 'false'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run triage action
        uses: rafalmasiarek/gh-triage-bot@v1.1.0
        with:
          config-path: .github/triage-rules.yml
          dry-run: ${{ github.event.inputs.dry_run || 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
