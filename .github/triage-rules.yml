version: 1

defaults:
  dry_run: false
  inactivity_days: 30
  comment_marker_prefix: triage-bot

#aliases:
#  repo_owner:
#    type: users
#    users:
#      - rafalmasiarek

rules:
  - name: assign-all-issues
    enabled: true
    on:
      - issues.opened
      - issues.edited
      - issues.labeled
      - issues.unlabeled
      - issues.reopened
      - issues.assigned
      - issues.unassigned
    if:
      type: issue
    then:
      assign: ['@repo_owner']
    stop: true

  - name: review-all-prs
    enabled: true
    on:
      - pull_request.opened
      - pull_request.edited
      - pull_request.synchronize
      - pull_request.reopened
      - pull_request.ready_for_review
      - pull_request.converted_to_draft
      - pull_request.labeled
      - pull_request.unlabeled
    if:
      type: pull_request
    then:
      request_reviewers: ['@repo_owner']
    stop: true

  - name: remind-inactive-items
    enabled: true
    on:
      - schedule.daily
    if:
      state: open
      assignee_present: true
      days_inactive_gt: 30
    then:
      comment_once_key: inactive-reminder
      comment: |
        Ping @{assignees} — this item has been inactive for @{age_days} days.

fallback:
  issue: {}
  pull_request: {}
